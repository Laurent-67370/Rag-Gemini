<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RAG Multimodal — Connexion</title>
<meta name="color-scheme" content="dark"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d1a;--card:#0e1a2e;--border:#1e3050;--accent:#f97316;--a10:rgba(249,115,22,.1);--a20:rgba(249,115,22,.2);--title:#fff;--body:#cbd5e1;--muted:#64748b;--red:#f87171;--green:#4ade80}
body{background:var(--bg);color:var(--body);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(249,115,22,.06),transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(96,165,250,.04),transparent 60%);pointer-events:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:32px}
.logo-title{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#f97316,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px}
.logo-sub{font-size:12px;color:var(--muted);margin-top:4px}
.logo-icon{font-size:3rem;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.field{margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px}
input{width:100%;background:rgba(6,13,26,.8);border:1px solid var(--border);color:var(--title);border-radius:10px;padding:12px 16px;font-size:14px;outline:none;transition:all .2s;font-family:inherit}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--a10)}
.btn-login{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;box-shadow:0 4px 14px var(--a20)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--a20)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-top:14px;display:none;text-align:center}
.error.show{display:block;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🔮</span>
    <div class="logo-title">RAG Multimodal</div>
    <div class="logo-sub">Gemini Embedding 2 · Pinecone</div>
  </div>

  <form onsubmit="doLogin(event)">
    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="Votre nom d'utilisateur" autocomplete="username" required/>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">
      <span id="btnText">Se connecter</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <div class="error" id="errorMsg"></div>

  <div class="footer">https://rag.lhusser.cloud</div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const errEl = document.getElementById('errorMsg');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';
  errEl.classList.remove('show');

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Erreur de connexion');
    window.location.href = '/';
  } catch(err) {
    errEl.textContent = '❌ ' + err.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btnText.style.display = 'block';
    spinner.style.display = 'none';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}
// Auto-focus
document.getElementById('username').focus();
</script>
</body>
</html>
